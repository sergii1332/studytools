<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora de Nota Necesaria - StudyTools</title>
  <meta name="description" content="Calcula qué nota necesitas sacar en tu examen final para alcanzar tu nota objetivo.">
  <link rel="stylesheet" href="../style.css">
</head>
<body>

<header class="header">
  <h1>Calculadora de Nota Necesaria</h1>
  <p>Descubre qué nota necesitas en el examen final</p>
</header>

<div class="container">
  <a href="../index.html">🏠 Inicio</a>
</div>

<main class="container">
  <div class="card">

    <h2>Introduce tus datos</h2>

    <input
      type="number"
      id="current-grade-es"
      placeholder="Nota actual"
    >

    <br><br>

    <input
      type="number"
      id="final-weight-es"
      placeholder="Peso del examen final (%)"
    >

    <br><br>

    <input
      type="number"
      id="desired-grade-es"
      placeholder="Nota final deseada"
    >

    <br><br>

    <button onclick="calculateFinalGradeSpanish()">
      Calcular
    </button>

    <br><br>

    <h2 id="final-grade-result-es"></h2>

  </div>
</main>

<script src="../script.js"></script>

</body>
</html>
