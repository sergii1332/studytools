<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora de Media - StudyTools</title>
  <meta name="description" content="Calcula la media de varios números online de forma gratuita.">
  <link rel="stylesheet" href="../style.css">
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
</head>
<body>

<header class="header">
  <h1>Calculadora de Media</h1>
  <p>Calcula medias rápidamente</p>
</header>

<main class="container">
  <div class="card">

    <h2>Introduce números</h2>

    <div id="average-container-es">
      <input type="number" class="average-input-es" placeholder="Número">
    </div>

    <br>

    <button onclick="addAverageInputSpanish()">Añadir número</button>
    <button onclick="calculateAverageToolSpanish()">Calcular</button>

    <br><br>

    <h2 id="average-tool-result-es"></h2>

  </div>
</main>

<script src="../script.js"></script>
</body>
</html>
