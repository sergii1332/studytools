<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de Horas de Estudio - StudyTools</title>
<link rel="stylesheet" href="../style.css">
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
</head>
<body>

<header class="header">
<h1>Calculadora de Horas de Estudio</h1>
<p>Calcula tus horas semanales de estudio</p>
</header>

<main class="container">
<div class="card">

<h2>Asignaturas</h2>
<input type="number" id="subjects-es" placeholder="Número de asignaturas">

<br><br>

<h2>Horas por asignatura a la semana</h2>
<input type="number" id="hours-es" placeholder="Horas">

<br><br>

<button onclick="calculateStudyHoursSpanish()">Calcular</button>

<br><br>

<h2 id="study-result-es"></h2>

</div>
</main>

<script src="../script.js"></script>
</body>
</html>
