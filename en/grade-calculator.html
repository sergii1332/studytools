<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Grade Calculator - Free Online Grade Calculator</title>

  <meta name="description" content="Free online grade calculator for students. Calculate your grades quickly and easily.">

  <meta name="robots" content="index,follow">

  <link rel="canonical" href="https://sergii1332.github.io/studytools/en/grade-calculator.html">

</head>

<body>

<header class="header">
  <h1>Grade Calculator</h1>
  <p>Calculate your average grade for free</p>
</header>

<main class="container">
  <div class="card">
    <h2>Enter your grades</h2>

    <div id="grades-container">
      <input type="number" class="grade-input" placeholder="Grade">
    </div>

    <br>

    <button onclick="addGradeInput()">Add another grade</button>
    <button onclick="calculateAverage()">Calculate</button>

    <br><br>

    <h2 id="average-result"></h2>
  </div>
</main>

<script src="../script.js"></script>
</body>
</html>
