<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Average Calculator - StudyTools</title>
  <meta name="description" content="Calculate the average of multiple numbers online.">
  <link rel="stylesheet" href="../style.css">
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
</head>
<body>

<header class="header">
  <h1>Average Calculator</h1>
  <p>Calculate averages instantly</p>
</header>

<main class="container">
  <div class="card">

    <h2>Enter Numbers</h2>

    <div id="average-container">
      <input type="number" class="average-input" placeholder="Number">
    </div>

    <br>

    <button onclick="addAverageInput()">Add Number</button>
    <button onclick="calculateAverageTool()">Calculate</button>

    <br><br>

    <h2 id="average-tool-result"></h2>

  </div>
</main>

<script src="../script.js"></script>
</body>
</html>
