<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Hours Calculator</title>
<link rel="stylesheet" href="../style.css">
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
</head>
<body>

<header class="header">
<h1>Study Hours Calculator</h1>
<p>Estimate your weekly study hours</p>
</header>

<main class="container">

<div class="card">

<h2>Subjects</h2>

<input type="number" id="subjects" placeholder="Number of subjects">

<br><br>

<h2>Hours per subject per week</h2>

<input type="number" id="hours" placeholder="Hours">

<br><br>

<button onclick="calculateStudyHours()">
Calculate
</button>

<br><br>

<h2 id="study-result"></h2>

</div>

</main>

<script src="../script.js"></script>

</body>
</html>
